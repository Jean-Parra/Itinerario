<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Panamá + Río 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e17;--s:#111827;--s2:#1a2235;--a:#f59e0b;--g:#10b981;--r:#ef4444;--bl:#3b82f6;--t:#e2e8f0;--tm:#94a3b8;--td:#64748b;--b:#1e293b}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{display:none}
*{scrollbar-width:none}
input,textarea,select{font-family:inherit;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--a)!important}
button{font-family:inherit}
.mono{font-family:'JetBrains Mono',monospace}
.pf{font-family:'Playfair Display',serif}

/* SYNC BAR */
.sync-bar{position:fixed;top:0;left:0;right:0;height:3px;z-index:999;transition:opacity .3s}
.sync-bar.syncing{background:linear-gradient(90deg,var(--a),var(--g),var(--a));background-size:200%;animation:shimmer 1s infinite}
.sync-bar.ok{background:var(--g);opacity:0}
.sync-bar.err{background:var(--r)}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}

/* HERO */
.hero{text-align:center;padding:2.5rem 1.5rem 1.5rem;background:radial-gradient(ellipse at 20% 50%,rgba(239,68,68,.1) 0%,transparent 50%),radial-gradient(ellipse at 80% 50%,rgba(59,130,246,.1) 0%,transparent 50%)}
.hero-flags{font-size:2.2rem;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.hero h1{font-size:clamp(2rem,6vw,3.5rem);font-weight:900;background:linear-gradient(135deg,var(--a),#fbbf24,var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1}
.stats{display:flex;justify-content:center;gap:1.5rem;flex-wrap:wrap;margin-top:1rem}
.stat-v{font-size:1.6rem;font-weight:900;color:var(--a)}
.stat-l{font-size:.6rem;color:var(--td);text-transform:uppercase;letter-spacing:.14em}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(10,14,23,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--b);padding:.45rem .6rem}
.nav-inner{display:flex;gap:.2rem;overflow-x:auto;max-width:1100px;margin:0 auto}
.nav-tab{padding:.45rem .7rem;border-radius:9px;font-size:.65rem;font-weight:700;white-space:nowrap;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;transition:all .2s}
.nav-tab:hover{background:var(--s);color:var(--t)}
.nav-tab.active{background:var(--a);color:var(--bg);border-color:var(--a)}
.nav-tab.add{border:1px dashed #334155;color:var(--g)}

/* DAY */
.day-section{max-width:860px;margin:0 auto;padding:2rem 1rem .5rem}
.day-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.25rem .7rem;border-radius:50px;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem}
.day-title{font-size:clamp(1.4rem,4vw,2rem);font-weight:900;line-height:1.2;cursor:pointer}
.day-date{font-size:.8rem;color:var(--tm)}
.day-edit-hint{font-size:.58rem;color:#334155;margin-top:.2rem}

/* TIMELINE */
.timeline{position:relative;padding-left:1.8rem}
.timeline::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--a),var(--b))}
.tl-item{position:relative;margin-bottom:.8rem}
.tl-dot{position:absolute;left:-1.8rem;top:.25rem;width:12px;height:12px;border-radius:50%;border:2.5px solid var(--bg);z-index:2}
.tl-card{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:.9rem;cursor:pointer;transition:all .2s}
.tl-card:hover{border-color:rgba(245,158,11,.25);transform:translateX(3px)}
.tl-time{font-size:.7rem;color:var(--a);font-weight:600;margin-bottom:.15rem}
.tl-name{font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:.35rem;margin-bottom:.15rem}
.tl-desc{font-size:.78rem;color:var(--tm);line-height:1.45}
.tl-price{display:inline-flex;align-items:center;gap:.25rem;padding:.15rem .55rem;border-radius:50px;font-size:.67rem;font-weight:600;margin-top:.35rem}
.tl-price.paid{background:rgba(245,158,11,.1);color:var(--a)}
.tl-price.free{background:rgba(16,185,129,.1);color:var(--g)}
.tl-edit-hint{font-size:.55rem;color:#1e293b;margin-top:.3rem}

/* EDIT CARD */
.edit-card{background:var(--s);border:1px solid var(--a);border-radius:12px;padding:1rem}
.edit-row{display:grid;gap:.4rem;margin-bottom:.4rem}
.edit-row.two{grid-template-columns:80px 1fr}
.edit-row.half{grid-template-columns:1fr 1fr}
.edit-input{background:var(--s2);border:1px solid var(--b);border-radius:7px;padding:.45rem;color:var(--t);font-size:.82rem}
.edit-input.time{color:var(--a);font-family:'JetBrains Mono',monospace;text-align:center}
.edit-input.title{font-weight:700;font-size:.9rem}
.edit-input.price{color:var(--a)}
.edit-textarea{width:100%;background:var(--s2);border:1px solid var(--b);border-radius:7px;padding:.45rem;color:var(--tm);font-size:.78rem;resize:vertical;font-family:inherit;min-height:48px}
.edit-select{background:var(--s2);border:1px solid var(--b);border-radius:7px;padding:.45rem;color:var(--t);font-size:.78rem}
.edit-btns{display:flex;gap:.3rem;margin-top:.6rem;flex-wrap:wrap}
.btn{border:none;border-radius:7px;padding:.4rem .8rem;font-weight:700;cursor:pointer;font-size:.72rem;transition:all .15s}
.btn-ok{background:var(--g);color:#fff}
.btn-up,.btn-dn{background:var(--s2);color:var(--t);border:1px solid var(--b)}
.btn-del{background:rgba(239,68,68,.1);color:var(--r);border:1px solid rgba(239,68,68,.25)}
.btn:disabled{opacity:.3;cursor:default}

/* ICONS */
.icon-grid{display:flex;flex-wrap:wrap;gap:.2rem;background:var(--s2);border-radius:7px;padding:.4rem;max-height:100px;overflow-y:auto;margin-top:.3rem}
.icon-btn{font-size:1.1rem;background:transparent;border:none;border-radius:5px;padding:.2rem;cursor:pointer}
.icon-btn.sel{background:rgba(245,158,11,.2)}

/* ADD BTN */
.add-between{text-align:center;margin:.25rem 0}
.add-between button{background:transparent;border:1px dashed #253048;border-radius:7px;padding:.15rem .6rem;color:#384860;font-size:.62rem;cursor:pointer;transition:all .2s}
.add-between button:hover{border-color:var(--g);color:var(--g)}

/* DIVIDER */
.divider{text-align:center;padding:1rem 0;position:relative}
.divider::before{content:'';position:absolute;left:10%;right:10%;top:50%;height:1px;background:linear-gradient(90deg,transparent,var(--b),transparent)}
.divider span{position:relative;background:var(--bg);padding:0 1rem;font-size:1.1rem}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--s);border:1px solid var(--r);border-radius:14px;padding:1.3rem;max-width:320px;width:100%;text-align:center}
.modal h3{font-size:1rem;font-weight:700;margin:.4rem 0}
.modal p{font-size:.78rem;color:var(--tm);margin-bottom:1rem}
.modal-btns{display:flex;gap:.4rem;justify-content:center}

/* DAY EDIT */
.day-edit{display:flex;flex-direction:column;gap:.4rem}
.day-edit-btns{display:flex;gap:.4rem}

/* BOTTOM */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,14,23,.93);backdrop-filter:blur(20px);border-top:1px solid var(--b);padding:.5rem 1rem;z-index:100;display:flex;justify-content:space-between;align-items:center}
.bottom-bar .label{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--td)}
.bottom-bar .count{font-size:1.3rem;font-weight:900;color:var(--a)}
.bottom-bar .count small{font-size:.6rem;color:var(--td);font-weight:400}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:.3rem}
.sync-dot.on{background:var(--g);box-shadow:0 0 6px var(--g)}
.sync-dot.off{background:var(--r)}

.pb{padding-bottom:4.5rem}

@media(max-width:500px){
  .stats{gap:1rem}
  .edit-row.two{grid-template-columns:70px 1fr}
}
</style>
</head>

let days = [];
let editingItem = null; // {dayId, itemId}
let editingDay = null;
let confirmDel = null;
let activeDay = "d0";
let showIcons = false;
let localVersion = 0;
let connected = false;
let uid = Date.now();

function genId(){ return "i"+(uid++); }

// ═══════════════════════════════════════════════════════════
// SYNC
// ═══════════════════════════════════════════════════════════
let evtSource = null;
let pushTimer = null;

function syncBar(state){
  const el = document.getElementById("syncBar");
  el.className = "sync-bar " + state;
  if(state==="ok") setTimeout(()=>{ el.style.opacity="0"; },1500);
  else el.style.opacity="1";
}

function connectSSE(){
  if(evtSource) evtSource.close();
  evtSource = new EventSource("/api/events");
  evtSource.onopen = () => { connected=true; render(); };
  evtSource.onmessage = (e) => {
    try{
      const msg = JSON.parse(e.data);
      if(msg.type==="update" && msg.version > localVersion){
        days = msg.data;
        localVersion = msg.version;
        syncBar("ok");
        render();
      }
      if(msg.type==="connected"){
        localVersion = msg.version;
        loadData();
      }
    }catch(err){}
  };
  evtSource.onerror = () => {
    connected=false;
    syncBar("err");
    render();
    setTimeout(connectSSE, 3000);
  };
}

async function loadData(){
  try{
    const res = await fetch("/api/data");
    const json = await res.json();
    if(json.data){
      days = json.data;
      localVersion = json.version;
    } else {
      days = JSON.parse(JSON.stringify(DEFAULT_DATA));
      pushData();
    }
    render();
  }catch(e){
    days = JSON.parse(JSON.stringify(DEFAULT_DATA));
    render();
  }
}

function pushData(){
  clearTimeout(pushTimer);
  pushTimer = setTimeout(async ()=>{
    syncBar("syncing");
    try{
      const res = await fetch("/api/data",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({data:days})});
      const json = await res.json();
      localVersion = json.version;
      syncBar("ok");
    }catch(e){
      syncBar("err");
    }
  }, 300);
}

// ═══════════════════════════════════════════════════════════
// CRUD
// ═══════════════════════════════════════════════════════════
function updateItem(dayId,itemId,key,val){
  const d = days.find(x=>x.id===dayId);
  if(!d) return;
  const it = d.items.find(x=>x.id===itemId);
  if(!it) return;
  it[key] = val;
  render();
  pushData();
}

function deleteItem(dayId,itemId){
  const d = days.find(x=>x.id===dayId);
  if(!d) return;
  d.items = d.items.filter(x=>x.id!==itemId);
  confirmDel=null; editingItem=null;
  render();
  pushData();
}

function addItem(dayId,afterIdx){
  const d = days.find(x=>x.id===dayId);
  if(!d) return;
  const newIt = {id:genId(),time:"00:00",icon:"📍",name:"Nueva actividad",desc:"Descripción...",price:"",type:"activity"};
  d.items.splice(afterIdx+1,0,newIt);
  editingItem = {dayId, itemId:newIt.id};
  render();
  pushData();
}

function moveItem(dayId,idx,dir){
  const d = days.find(x=>x.id===dayId);
  if(!d) return;
  const ni = idx+dir;
  if(ni<0||ni>=d.items.length) return;
  [d.items[idx],d.items[ni]] = [d.items[ni],d.items[idx]];
  render();
  pushData();
}

function updateDay(dayId,key,val){
  const d = days.find(x=>x.id===dayId);
  if(!d) return;
  d[key] = val;
  render();
  pushData();
}

function addDay(){
  const nd = {id:genId(),flag:"📍",country:"rio",title:"Nuevo día",date:"Fecha",subtitle:"",items:[]};
  days.push(nd);
  editingDay = nd.id;
  render();
  pushData();
}

function deleteDay(dayId){
  days = days.filter(x=>x.id!==dayId);
  confirmDel=null; editingDay=null;
  render();
  pushData();
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function isFree(p){ return p && (p.toLowerCase().includes("gratis")||p.toLowerCase().includes("incluido")); }

function h(tag,attrs,children){
  let s = "<"+tag;
  if(attrs) for(const [k,v] of Object.entries(attrs)){ if(k!=="__html") s += ` ${k}="${String(v).replace(/"/g,"&quot;")}"`; }
  s += ">";
  if(attrs?.__html) s += attrs.__html;
  else if(Array.isArray(children)) s += children.join("");
  else if(children!=null) s += children;
  if(!["input","br","hr","img"].includes(tag)) s += "</"+tag+">";
  return s;
}

function renderItem(day,item,idx){
  const isEdit = editingItem && editingItem.dayId===day.id && editingItem.itemId===item.id;
  const dotColor = TYPE_COLORS[item.type]||"#f59e0b";

  if(isEdit){
    return h("div",{class:"tl-item"},[
      h("div",{class:"tl-dot",style:`background:${dotColor}`}),
      h("div",{class:"edit-card",id:"edit-"+item.id},[
        h("div",{class:"edit-row two"},[
          h("input",{class:"edit-input time mono",value:item.time,"data-dayid":day.id,"data-itemid":item.id,"data-field":"time",onchange:"handleInput(this)"}),
          h("input",{class:"edit-input title",value:item.name,"data-dayid":day.id,"data-itemid":item.id,"data-field":"name",onchange:"handleInput(this)"})
        ]),
        h("textarea",{class:"edit-textarea","data-dayid":day.id,"data-itemid":item.id,"data-field":"desc",onchange:"handleInput(this)"},item.desc),
        h("div",{class:"edit-row half"},[
          h("input",{class:"edit-input price",value:item.price,placeholder:"Precio (ej: $50k COP)","data-dayid":day.id,"data-itemid":item.id,"data-field":"price",onchange:"handleInput(this)"}),
          h("select",{class:"edit-select","data-dayid":day.id,"data-itemid":item.id,"data-field":"type",onchange:"handleInput(this)"},[
            h("option",{value:"activity",selected:item.type==="activity"?"selected":undefined},"🎯 Actividad"),
            h("option",{value:"meal",selected:item.type==="meal"?"selected":undefined},"🍽 Comida"),
            h("option",{value:"transit",selected:item.type==="transit"?"selected":undefined},"🚕 Transporte"),
          ])
        ]),
        h("div",{style:"margin-top:.4rem"},[
          h("span",{style:"font-size:.7rem;color:#64748b"},"Ícono: "),
          h("button",{onclick:"showIcons=!showIcons;render()",style:"font-size:1.2rem;background:#1a2235;border:1px solid #1e293b;border-radius:6px;padding:.2rem .5rem;cursor:pointer"},item.icon),
          showIcons ? h("div",{class:"icon-grid"},ICONS.map(ic=>
            h("button",{class:"icon-btn"+(item.icon===ic?" sel":""),onclick:`updateItem('${day.id}','${item.id}','icon','${ic}');showIcons=false;render()`},ic)
          )) : ""
        ]),
        h("div",{class:"edit-btns"},[
          h("button",{class:"btn btn-ok",onclick:`editingItem=null;showIcons=false;render()`},"✓ Guardar"),
          h("button",{class:"btn btn-up",onclick:`moveItem('${day.id}',${idx},-1)`,disabled:idx===0?"disabled":undefined},"↑"),
          h("button",{class:"btn btn-dn",onclick:`moveItem('${day.id}',${idx},1)`,disabled:idx===day.items.length-1?"disabled":undefined},"↓"),
          h("button",{class:"btn btn-del",onclick:`confirmDel={type:'item',dayId:'${day.id}',itemId:'${item.id}'};render()`},"🗑 Eliminar"),
        ])
      ]),
      h("div",{class:"add-between"},[h("button",{onclick:`addItem('${day.id}',${idx})`},"+ Agregar actividad")])
    ]);
  }

  const priceClass = item.price ? (isFree(item.price)?"tl-price free":"tl-price paid") : "";

  return h("div",{class:"tl-item"},[
    h("div",{class:"tl-dot",style:`background:${dotColor}`}),
    h("div",{class:"tl-card",onclick:`editingItem={dayId:'${day.id}',itemId:'${item.id}'};showIcons=false;render()`},[
      h("div",{class:"tl-time mono"},item.time),
      h("div",{class:"tl-name"},item.icon+" "+item.name),
      h("div",{class:"tl-desc"},item.desc),
      item.price ? h("div",{class:priceClass},(isFree(item.price)?"✅ ":"💵 ")+item.price) : "",
      h("div",{class:"tl-edit-hint"},"Toca para editar")
    ]),
    h("div",{class:"add-between"},[h("button",{onclick:`event.stopPropagation();addItem('${day.id}',${idx})`},"+ Agregar actividad")])
  ]);
}

function renderDay(day,dayIdx){
  const cc = COUNTRY_COLORS[day.country]||"#6366f1";
  const countryName = day.country==="panama"?"Panamá":day.country==="rio"?"Río de Janeiro":"Vuelo";

  let headerHtml;
  if(editingDay===day.id){
    headerHtml = h("div",{class:"day-edit"},[
      h("input",{class:"edit-input title",value:day.title,"data-dayid":day.id,"data-dayfield":"title",onchange:"handleDayInput(this)"}),
      h("input",{class:"edit-input",value:day.date,"data-dayid":day.id,"data-dayfield":"date",onchange:"handleDayInput(this)"}),
      h("input",{class:"edit-input",value:day.subtitle||"",placeholder:"Subtítulo (opcional)","data-dayid":day.id,"data-dayfield":"subtitle",onchange:"handleDayInput(this)"}),
      h("div",{class:"day-edit-btns"},[
        h("select",{class:"edit-select","data-dayid":day.id,"data-dayfield":"country",onchange:"handleDayInput(this)"},[
          h("option",{value:"panama",selected:day.country==="panama"?"selected":undefined},"🇵🇦 Panamá"),
          h("option",{value:"rio",selected:day.country==="rio"?"selected":undefined},"🇧🇷 Río"),
          h("option",{value:"vuelta",selected:day.country==="vuelta"?"selected":undefined},"✈️ Vuelo"),
        ]),
        h("button",{class:"btn btn-ok",onclick:`editingDay=null;render()`},"✓ Listo"),
        h("button",{class:"btn btn-del",onclick:`confirmDel={type:'day',dayId:'${day.id}'};render()`},"Eliminar día"),
      ])
    ]);
  } else {
    headerHtml = h("div",{onclick:`editingDay='${day.id}';render()`,style:"cursor:pointer"},[
      h("h2",{class:"day-title pf"},day.title),
      h("p",{class:"day-date"},day.date+(day.subtitle?" · "+day.subtitle:"")),
      h("p",{class:"day-edit-hint"},"Toca para editar día")
    ]);
  }

  const timelineItems = day.items.map((it,i)=>renderItem(day,it,i)).join("");

  const emptyAdd = day.items.length===0 ? h("div",{style:"text-align:center;padding:1.5rem"},[
    h("button",{onclick:`addItem('${day.id}',-1)`,style:"background:#10b98122;border:1px dashed #10b981;border-radius:10px;padding:.6rem 1.2rem;color:#10b981;font-size:.8rem;font-weight:600;cursor:pointer"},"+ Agregar primera actividad")
  ]) : "";

  const divider = dayIdx < days.length-1 ? h("div",{class:"divider"},[
    h("span",{},day.country!==days[dayIdx+1]?.country ? day.flag+" → "+days[dayIdx+1]?.flag : "· · ·")
  ]) : "";

  return h("section",{class:"day-section",id:day.id},[
    h("div",{style:"margin-bottom:1.2rem"},[
      h("div",{class:"day-badge",style:`background:${cc}22;color:${cc};border:1px solid ${cc}44`},day.flag+" "+countryName),
      headerHtml
    ]),
    h("div",{class:"timeline"},timelineItems+emptyAdd),
    divider
  ]);
}

function render(){
  const actCount = days.reduce((a,d)=>a+d.items.filter(i=>i.type==="activity").length,0);
  const totalItems = days.reduce((a,d)=>a+d.items.length,0);

  const navTabs = days.map(d=>
    h("button",{class:"nav-tab"+(activeDay===d.id?" active":""),onclick:`activeDay='${d.id}';document.getElementById('${d.id}')?.scrollIntoView({behavior:'smooth',block:'start'})`},
      d.flag+" "+(d.date?.split(" ").slice(0,2).join(" ")||d.id))
  ).join("") + h("button",{class:"nav-tab add",onclick:"addDay()"},"+ Día");

  const modal = confirmDel ? h("div",{class:"modal-bg",onclick:"confirmDel=null;render()"},[
    h("div",{class:"modal",onclick:"event.stopPropagation()"},[
      h("div",{style:"font-size:1.8rem"},"🗑"),
      h("h3",{},"¿Eliminar "+(confirmDel.type==="day"?"este día completo":"esta actividad")+"?"),
      h("p",{},"Esta acción no se puede deshacer"),
      h("div",{class:"modal-btns"},[
        h("button",{class:"btn",style:"background:#1e293b;color:#e2e8f0;border:1px solid #334155",onclick:"confirmDel=null;render()"},"Cancelar"),
        confirmDel.type==="day"
          ? h("button",{class:"btn",style:"background:#ef4444;color:#fff",onclick:`deleteDay('${confirmDel.dayId}')`},"Sí, eliminar")
          : h("button",{class:"btn",style:"background:#ef4444;color:#fff",onclick:`deleteItem('${confirmDel.dayId}','${confirmDel.itemId}')`},"Sí, eliminar")
      ])
    ])
  ]) : "";

  document.getElementById("app").innerHTML = [
    // Hero
    h("div",{class:"hero"},[
      h("div",{class:"hero-flags"},"🇵🇦 ✈️ 🇧🇷"),
      h("h1",{class:"pf"},"Panamá + Río"),
      h("p",{style:"color:#94a3b8;font-size:.9rem;margin-top:.2rem"},"17 – 23 Junio 2026 · Jean Pierre & Saider David"),
      h("p",{style:"color:#475569;font-size:.72rem;margin-top:.3rem"},'Copa Airlines · Reserva <span class="mono" style="color:#f59e0b">835597341700</span>'),
      h("div",{class:"stats"},[
        ["2","Países"],["4","Sellos"],[days.length,"Días"],[actCount,"Actividades"]
      ].map(([v,l])=>h("div",{style:"text-align:center"},[h("div",{class:"stat-v"},v),h("div",{class:"stat-l"},l)])).join(""))
    ]),
    // Nav
    h("nav",{class:"nav"},[h("div",{class:"nav-inner"},navTabs)]),
    // Days
    h("div",{style:"padding-bottom:4.5rem"},days.map((d,i)=>renderDay(d,i)).join("")),
    // Modal
    modal,
    // Bottom bar
    h("div",{class:"bottom-bar"},[
      h("div",{},[
        h("div",{class:"label"},[
          h("span",{class:"sync-dot "+(connected?"on":"off")}),
          connected?"En vivo · todos sincronizados":"Sin conexión"
        ]),
        h("div",{style:"font-size:.7rem;color:#64748b"},"Toca cualquier actividad o día para editar")
      ]),
      h("div",{class:"count"},totalItems+h("small",{}," items"))
    ])
  ].join("");
}

// ═══════════════════════════════════════════════════════════
// EVENT HANDLERS (global)
// ═══════════════════════════════════════════════════════════
window.handleInput = function(el){
  const {dayid,itemid,field} = el.dataset;
  updateItem(dayid,itemid,field,el.value);
};

window.handleDayInput = function(el){
  const {dayid,dayfield} = el.dataset;
  updateDay(dayid,dayfield,el.value);
  if(dayfield==="country"){
    const flags = {panama:"🇵🇦",rio:"🇧🇷",vuelta:"✈️"};
    updateDay(dayid,"flag",flags[el.value]||"📍");
  }
};

// Expose to onclick handlers
window.updateItem = updateItem;
window.deleteItem = deleteItem;
window.addItem = addItem;
window.moveItem = moveItem;
window.updateDay = updateDay;
window.addDay = addDay;
window.deleteDay = deleteDay;
window.render = render;

// Scroll spy
let spyTimer;
window.addEventListener("scroll",()=>{
  clearTimeout(spyTimer);
  spyTimer = setTimeout(()=>{
    for(const d of days){
      const el = document.getElementById(d.id);
      if(el && el.getBoundingClientRect().top <= 100) activeDay = d.id;
    }
    document.querySelectorAll(".nav-tab").forEach(t=>{
      // simple re-highlight without full rerender
      const txt = t.textContent;
      const ad = days.find(d=>d.id===activeDay);
      if(ad && txt.includes(ad.date?.split(" ")[0]||"")) t.classList.add("active");
    });
  },100);
});

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
connectSSE();
</script>
